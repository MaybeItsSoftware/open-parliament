name: Flutter CI

# Runs on PRs only. Direct pushes to main are gated by the deploy workflow's
# own "Pre-deploy checks" job, so triggering here too would just duplicate it.
on:
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # `.env` is a declared asset (pubspec.yaml), so analyze/build require it
      # to exist. It is gitignored, so materialize it from the secret here.
      # On fork PRs the secret is empty — an empty DSN is fine (Sentry stays off).
      - name: Write .env
        run: echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" > .env

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --fatal-infos

      - name: Run unit tests
        run: flutter test --reporter=compact
