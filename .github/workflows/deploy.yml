name: Deploy to TestFlight & Play Store

on:
  push:
    branches: [main]
  # Allow a manual run from the Actions tab — useful for the first deploy and
  # for re-running without pushing a new commit to main.
  workflow_dispatch:

# Only one deploy at a time; cancel in-progress runs if a new commit lands.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.0'

jobs:
  # ─── Shared gate: analyse + test before building anything ───
  test:
    name: Pre-deploy checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # `.env` is a declared asset (pubspec.yaml), so analyze requires it to
      # exist. It is gitignored, so materialize it from the secret here.
      - name: Write .env
        run: echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" > .env

      - name: Analyze code
        run: flutter analyze --fatal-infos

      - name: Run unit tests
        run: flutter test --reporter=compact

  # ─── iOS: build IPA → upload to TestFlight (via Fastlane) ───
  deploy-ios:
    name: iOS → TestFlight
    needs: test
    # macos-latest can lag behind on Xcode; pin an image that ships Xcode 26
    # (required: App Store Connect rejects builds made with SDKs older than iOS 26).
    runs-on: macos-15
    timeout-minutes: 45
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - uses: actions/checkout@v4

      # App Store Connect now requires builds compiled with the iOS 26 SDK.
      # Select the newest stable Xcode on the runner explicitly so we don't
      # silently fall back to an older default toolchain.
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      # Load the read-only deploy key so match can clone match-certs over SSH.
      - name: Load match-certs SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_SSH_KEY }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Write .env for release build
        run: echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" > .env

      # match fetches the cert + profile, signs, builds, and uploads to TestFlight.
      - name: Build & upload to TestFlight
        run: bundle exec fastlane ios beta
        env:
          # Monotonic build number so each TestFlight upload is unique/increasing.
          BUILD_NUMBER: ${{ github.run_number }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          TEAM_ID: '6NQNU5YSC2'

      # ── Upload dSYMs to Sentry ──
      - name: Upload dSYMs to Sentry
        if: env.SENTRY_AUTH_TOKEN != ''
        run: |
          brew install getsentry/tools/sentry-cli
          sentry-cli debug-files upload \
            --include-sources \
            build/ios/archive/Runner.xcarchive/dSYMs

  # ─── Android: build AAB → upload to Play Store (via Fastlane) ───
  deploy-android:
    name: Android → Play Store
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Get dependencies
        run: flutter pub get

      - name: Write .env for release build
        run: echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" > .env

      # ── Decode the upload keystore + write key.properties for gradle ──
      - name: Decode signing keystore
        run: echo -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Write key.properties
        run: |
          cat <<EOF > android/key.properties
          storeFile=${{ github.workspace }}/android/app/upload-keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # Fastlane builds the signed AAB and uploads it to the internal track.
      - name: Build & upload to Play (internal)
        run: bundle exec fastlane android beta
        env:
          # Monotonic versionCode so each Play upload is unique/increasing.
          BUILD_NUMBER: ${{ github.run_number }}
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}

      # ── Upload debug symbols to Sentry ──
      - name: Upload native symbols to Sentry
        if: env.SENTRY_AUTH_TOKEN != ''
        run: |
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli debug-files upload \
            --include-sources \
            build/app/intermediates/merged_native_libs/release/mergeReleaseNativeLibs/out/lib
