name: Deploy to TestFlight & Play Store

# Triggered when the Release workflow finishes on main, rather than on the tag
# push itself: semantic-release pushes its tag using this workflow's
# GITHUB_TOKEN, and GitHub never lets a GITHUB_TOKEN-authored push trigger
# another `on: push` workflow (an anti-recursion guard) — so `on: push: tags:`
# here would simply never fire. workflow_run has no such restriction, since it
# watches the *Release* workflow's completion rather than a push event.
#
# Not every Release run cuts a new tag (e.g. a docs/chore-only merge), so
# check-release below only lets the rest of the pipeline run if the commit
# Release just left on main is actually tagged vX.Y.Z.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]
  # Allow a manual run from the Actions tab — useful for re-running a deploy
  # without a new commit (useful after a flaky runner, certificate expiry, etc.).
  workflow_dispatch:

# Only one deploy at a time; cancel in-progress runs if a new one lands.
concurrency:
  group: deploy-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.0'

jobs:
  # ─── Gate: only deploy if Release succeeded AND actually cut a new tag ───
  check-release:
    name: Check a release happened
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.check.outputs.released }}
      sha: ${{ steps.check.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full tag history to check what's tagged at HEAD

      - name: Was the commit Release just left on main tagged as a release?
        id: check
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          elif git describe --tags --exact-match HEAD 2>/dev/null | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

  # ─── Shared gate: analyse + test before building anything ───
  test:
    name: Pre-deploy checks
    needs: check-release
    if: needs.check-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-release.outputs.sha }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --fatal-infos

      - name: Run unit tests
        run: flutter test --reporter=compact

  # ─── iOS: build IPA → upload to TestFlight (via Fastlane) ───
  deploy-ios:
    name: iOS → TestFlight
    needs: [check-release, test]
    runs-on: macos-15
    timeout-minutes: 45
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-release.outputs.sha }}

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Load match-certs SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_SSH_KEY }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Write .env for release build
        run: |
          mkdir -p assets/env
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" > assets/env/.env

      - name: Build & upload to TestFlight
        run: bundle exec fastlane ios beta
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          TEAM_ID: '6NQNU5YSC2'

      - name: Upload dSYMs to Sentry
        if: env.SENTRY_AUTH_TOKEN != ''
        run: |
          brew install getsentry/tools/sentry-cli
          sentry-cli debug-files upload \
            --include-sources \
            build/ios/archive/Runner.xcarchive/dSYMs

  # ─── Android: build AAB → upload to Play Store (via Fastlane) ───
  deploy-android:
    name: Android → Play Store
    needs: [check-release, test]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-release.outputs.sha }}

      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Get dependencies
        run: flutter pub get

      - name: Write .env for release build
        run: |
          mkdir -p assets/env
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" > assets/env/.env

      - name: Decode signing keystore
        run: echo -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Write key.properties
        run: |
          cat <<EOF > android/key.properties
          storeFile=${{ github.workspace }}/android/app/upload-keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build & upload to Play (internal)
        run: bundle exec fastlane android beta
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}

      - name: Upload native symbols to Sentry
        if: env.SENTRY_AUTH_TOKEN != ''
        run: |
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli debug-files upload \
            --include-sources \
            build/app/intermediates/merged_native_libs/release/mergeReleaseNativeLibs/out/lib
