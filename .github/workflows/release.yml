name: Release

on:
  push:
    branches:
      - main

env:
  FLUTTER_VERSION: '3.44.0'

jobs:
  # Gate: tests must pass before semantic-release creates any tag.
  test:
    name: Pre-release checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test --reporter=compact

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history to find the last tag

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Verify a reachable release tag exists
        # semantic-release silently releases 1.0.0 (ignoring commit types) when it
        # can't find any reachable vX.Y.Z tag — this has bitten us twice (see
        # RELEASING.md). Fail loudly instead so a lost/deleted tag is caught here,
        # not discovered after a wrong version ships.
        run: |
          if ! git tag --merged HEAD | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::No reachable vX.Y.Z tag found in history — semantic-release would default to 1.0.0 instead of bumping from the real baseline. Fix the tags before merging (see RELEASING.md troubleshooting)."
            exit 1
          fi

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
