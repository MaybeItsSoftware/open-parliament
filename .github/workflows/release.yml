name: Release

# Manual only: trigger a release deliberately from the Actions tab when you're
# ready to cut one. This stops semantic-release from auto-publishing on every
# push to main (which would always start at v1.0.0 on the first run).
on:
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for pushing tags and creating releases
      issues: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history to find the last tag

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci || npm install # Gracefully handle missing package-lock.json

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
