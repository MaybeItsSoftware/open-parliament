name: open_hansard
description: Mobile app for reading UK Parliamentary debates verbatim from Hansard.
version: 0.1.0+10000
publish_to: none

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  sentry_flutter: ^9.22.0
  # Pulled in transitively by sentry_flutter, but the plain-Dart service layer
  # (api_services.dart) imports the core `sentry` package directly rather than
  # sentry_flutter so it keeps no Flutter-binding dependency.
  sentry: ^9.22.0
  flutter:
    sdk: flutter

  # Load environment variables from .env file
  flutter_dotenv: ^5.2.1

  # HTTP requests to Parliament APIs
  http: ^1.2.0

  # Local SQLite storage (local-first data strategy)
  sqflite: ^2.3.3
  path_provider: ^2.1.2
  path: ^1.9.0

  # Portrait image caching to disk
  cached_network_image: ^3.3.1

  # State management
  provider: ^6.1.2

  # Persist user preferences (dark mode)
  shared_preferences: ^2.2.3

  # Calendar date picker for sitting days
  table_calendar: ^3.1.2

  # Scroll to specific item by index (Jump-to-Member feature)
  scrollable_positioned_list: ^0.3.8

  # Constituency map on member profile page
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  flutter_map_tile_caching: ^10.0.0

  # Open external URLs (e.g. parliamentlive.tv) in the system browser
  url_launcher: ^6.3.0

  # Native OS share sheet for sharing a speech (WhatsApp, Messages, Mail, …)
  share_plus: ^10.0.0

  # In-app embed of parliamentlive.tv on platforms that support it
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.11.0
  webview_flutter_wkwebview: ^3.24.5

dev_dependencies:
  sentry_dart_plugin: ^3.4.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - .env

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: open-parliament
  org: maybeitssoftware
